# EMS-ResNet10, T=1 — paper Table 5 row 1
model:
  num_classes: 80
  T: 1
  # Channel widths for COCO
  widths: [64, 128, 256, 512]
  head_ch: 256
  num_anchors: 3
  tau: 0.25
  v_th: 0.5
  alpha: 1.0

data:
  img_size: 416
  num_workers: 4

train:
  epochs: 10
  batch_size: 16          # fits 8 GB VRAM at 416px T=1 with AMP
  accum_steps: 2          # effective batch = batch_size * accum_steps = 32
  optimizer: SGD
  lr0: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  cosine: true            # cosine LR decay to lr0*0.01
  amp: true               # mixed precision
  save_every: 3  # sanity check
  eval_every: 3  # sanity check
