# EMS-ResNet10, T=7 — paper Table 5 row 4
model:
  num_classes: 80
  T: 7
  widths: [64, 128, 256, 512]
  head_ch: 256
  num_anchors: 3
  tau: 0.25
  v_th: 0.5
  alpha: 1.0

data:
  img_size: 640
  num_workers: 8

train:
  epochs: 100
  batch_size: 2           # T=7 is the tightest fit
  accum_steps: 16         # effective batch = 32
  optimizer: SGD
  lr0: 0.003
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 1
  cosine: true
  amp: true
  save_every: 10
  eval_every: 5
